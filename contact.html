<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://customer-assets.emergentagent.com/job_ajrakh-artistry/artifacts/f8iwx5x9_ChatGPT_Image_Apr_20__2026__12_35_22_AM-removebg-preview.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Contact — Devasaya</title>
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="contact container">
      <div class="section-head center">
        <p class="eyebrow">In Conversation</p>
        <h1 class="serif huge">Write to us</h1>
        <p class="italic muted">For custom orders, wholesale enquiries, press, or simply to say hello.</p>
      </div>
      <div class="contact-grid">
        <aside class="contact-info">
          <div class="info-block"><p class="eyebrow">Phone</p><p class="serif">+91 93408 53746</p></div>
          <div class="info-block"><p class="eyebrow">Email</p><p class="serif">devasaya.24@gmail.com</p></div>
          <div class="info-block"><p class="eyebrow">Atelier</p><p>Ajrakhpur · Kutch · Gujarat · India</p></div>
          <a href="https://wa.me/919340853746?text=Namaste%20Devasaya" target="_blank" rel="noreferrer" class="btn btn-madder">Message on WhatsApp</a>
        </aside>
        <form class="contact-form" id="contact-form">
          <label><span class="eyebrow">Name</span><input name="name" required /></label>
          <div class="row-2">
            <label><span class="eyebrow">Email</span><input name="email" type="email" required /></label>
            <label><span class="eyebrow">Phone</span><input name="phone" /></label>
          </div>
          <label><span class="eyebrow">Your message</span><textarea name="message" rows="6" required></textarea></label>
          <button type="submit" class="btn btn-primary">Send Message</button>
          <p class="form-note muted small" id="form-note" hidden></p>
        </form>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="script.js"></script>
</body>
</html>
