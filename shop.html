<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shop hand-block printed Ajrakh apparel — sarees, shirts, cordsets, kaftans and modal silk kurtis from Kutch, Gujarat." />
  <link rel="icon" href="https://customer-assets.emergentagent.com/job_ajrakh-artistry/artifacts/f8iwx5x9_ChatGPT_Image_Apr_20__2026__12_35_22_AM-removebg-preview.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Shop — Devasaya</title>
</head>
<body>
  <div id="root" style="display:none"></div>
  <div id="header"></div>

  <main class="shop-page container" data-testid="shop-page">
    <div class="section-head center">
      <p class="eyebrow">The Collection</p>
      <h1 class="serif huge">Hand-block printed pieces</h1>
      <p class="muted" style="max-width:42rem;margin:1rem auto 0;">Every piece is hand-stamped with carved teakwood blocks across sixteen stages of natural dyeing — no two are ever quite alike.</p>
    </div>

    <div class="filters" data-testid="shop-filters">
      <button class="filter active" data-cat="All" data-testid="filter-all">All</button>
      <button class="filter" data-cat="Shirts" data-testid="filter-shirts">Shirts</button>
      <button class="filter" data-cat="Cordsets" data-testid="filter-cordsets">Cordsets</button>
      <button class="filter" data-cat="Kaftans" data-testid="filter-kaftans">Kaftans</button>
      <button class="filter" data-cat="Modal Silk Kurtis" data-testid="filter-kurtis">Modal Silk Kurtis</button>
      <button class="filter" data-cat="Cotton Ajrakh Kurtis" data-testid="filter-cotton-kurtis">Cotton Ajrakh Kurtis</button>
    </div>

    <div class="product-grid" id="product-grid" data-testid="product-grid"></div>
  </main>

  <div id="footer"></div>
  <script src="script.js"></script>
</body>
</html>
