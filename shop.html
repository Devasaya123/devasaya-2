<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://customer-assets.emergentagent.com/job_ajrakh-artistry/artifacts/f8iwx5x9_ChatGPT_Image_Apr_20__2026__12_35_22_AM-removebg-preview.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Shop — Devasaya</title>
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="shop-page container">
      <div class="section-head center">
        <p class="eyebrow">The Collection</p>
        <h1 class="serif huge">Hand-block printed apparel</h1>
        <p class="italic muted">Sarees, shirts, cordsets, kaftans and modal three-piece suits — each a quiet conversation between artisan and earth.</p>
      </div>
      <div class="filters" id="filters">
        <button class="filter active" data-cat="All">All</button>
        <button class="filter" data-cat="Sarees">Sarees</button>
        <button class="filter" data-cat="Shirts">Shirts</button>
        <button class="filter" data-cat="Cordsets">Cordsets</button>
        <button class="filter" data-cat="Kaftans">Kaftans</button>
        <button class="filter" data-cat="Modal 3 Piece Suits">Modal 3 Piece Suits</button>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="script.js"></script>
</body>
</html>
